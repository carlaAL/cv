<section class="education" @fadeUp *ngIf="languageService.data().certifications && languageService.data().certifications?.length">
  <h2>{{ languageService.currentLanguage() === 'es' ? 'Cursos y Certificaciones' : 'Courses & Certifications' }}</h2>

  <div class="timeline">
    <div class="timeline-item" *ngFor="let item of languageService.data().certifications">
      <div class="period">{{ item.period }}</div>
      <div class="content">
        <h3>{{ item.degree }}</h3>
        <h4>{{ item.institution }}</h4>
        <p *ngIf="item.details">{{ item.details }}</p>
      </div>
    </div>
  </div>
</section>
