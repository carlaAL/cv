<header class="sticky-header">
  <h1 class="sticky-name" [class.visible]="showStickyHeader">{{ languageService.data().personal.name }}</h1>

  <div class="controls">
    <button class="icon-btn" (click)="toggleTheme()" title="Toggle Theme">
      <span class="material-icons">brightness_6</span>
    </button>
    <button class="icon-btn" (click)="language.toggleLanguage()" title="Change Language" style="display: flex; align-items: center; gap: 4px;">
      <span style="font-size: 0.9rem; ">{{ language.currentLanguage() === 'es' ? 'EN' : 'ES' }}</span>
    </button>
    <button class="icon-btn" (click)="print()" title="Print CV">
      <span class="material-icons">print</span>
    </button>
  </div>
</header>

<app-hero></app-hero>
<app-experience></app-experience>
<app-education></app-education>
<app-projects></app-projects>
<app-certifications></app-certifications>
<app-skills></app-skills>
<app-contact></app-contact>
